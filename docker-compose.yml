version: '3.8'

services:
  # Redis task queue service for distributed processing
  redis:
    image: redis:7-alpine
    container_name: equilibrium-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Reference app worker/API instance
  api:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: equilibrium-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/equilibrium.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    volumes:
      - sqlite_data:/workspace/data
    depends_on:
      - redis
    restart: always

volumes:
  redis_data:
  sqlite_data:
